    <linearGradient id="og-curve-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ECEFF4" stop-opacity="0.22" />
      <stop offset="1" stop-color="#ECEFF4" stop-opacity="0" />

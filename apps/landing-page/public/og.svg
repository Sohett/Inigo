<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="og-base" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1026" />
      <stop offset="0.46" stop-color="#141A3C" />
      <stop offset="0.78" stop-color="#28215A" />
      <stop offset="1" stop-color="#5A2E63" />
    </linearGradient>
    <radialGradient id="og-glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(210 760) scale(760 470)">
